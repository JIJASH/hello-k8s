# developers GROUP binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developers-group-rolebinding
  namespace: default
subjects:
- kind: Group
  name: developers          # matches /O=developers in certificate!
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
---
# qa-team GROUP binding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qa-group-rolebinding
  namespace: default
subjects:
- kind: Group
  name: qa-team             # matches /O=qa-team in certificate!
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: qa-role
  apiGroup: rbac.authorization.k8s.io
---
# devops-team GROUP binding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-group-clusterrolebinding
subjects:
- kind: Group
  name: devops-team         # matches /O=devops-team in certificate!
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: devops-clusterrole
  apiGroup: rbac.authorization.k8s.io