elasticsearchHosts: "http://elasticsearch-master:9200"
replicas: 1
resources:
  requests:
    memory: "256Mi"
    cpu: "200m" 
  limits:
    memory: "512Mi"
    cpu: "500m"

service:
  type: ClusterIP
  port: 5601

kibanaConfig:
  kibana.yml: |
    server.host: "0.0.0.0"
    elasticsearch.hosts: ["http://elasticsearch-master:9200"]
    xpack.security.enabled: false
    xpack.fleet.enabled: false