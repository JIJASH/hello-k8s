daemonSetVolumes: 
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readonly: true

config:
  service: |
    [SERVICE]
        Flush          1
        Daemon         Off
        Log_Level      info
        Parsers_File   parsers.conf
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020
  input: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser   docker, cri
        Tag               kube.*
        Refresh_Interval   5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines    On
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On
      
    [FILTER]
        Name                grep
        Match               kube.*
        Exclude             log ^$

    [FILTER]
        Name                modify
        Match               kube.*
        Add                 cluster minikube
        Add                 environment production

  outputs: |
    [OUTPUT]
        Name              es
        Match             *
        Host              elasticsearch-master.logging.svc.cluster.local
        Port              9200
        Logstash_Format   On
        Logstash_Prefix   kubernetes
        Logstash_DateFormat %Y.%m.%d
        Retry_Limit       False
        Time_Key          @timestamp
        Replace_Dots      On
        Generate_ID       On

  parsers: |
    [PARSER]
        Name         docker
        Format       json
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L
        Time_Keep    On

    [PARSER]
        Name         json
        Format       json
        Time_Key     json
        Time_Format  %Y-%m-%dT%H:%M:%S.%L

    [PARSER]
        Name         syslog
        Format       regex
        Regex        ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key     time
        Time_Format  %b %d %H:%M:%S